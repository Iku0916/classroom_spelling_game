Style/Documentation:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - 'config/routes.rb'
    - 'config/environments/*.rb'
    - 'db/schema.rb'
    - 'bin/bundle'
    - 'spec/**/*'

Layout/LineLength:
  Max: 140

Metrics/MethodLength:
  Max: 20

AllCops:
  Exclude:
    - 'bin/**/*'
    - 'vendor/**/*'

Naming/VariableNumber:
  Enabled: false